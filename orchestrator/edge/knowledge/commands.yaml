# commands.yaml — 车控命令 schema（来源：同行者公版语音指令表 6.1 分类表+意图表）
# 每个 object 声明：operates/attrs/modes/positions/units/online/drive_restricted/require_confirm/voice_forbidden
# positions=true 表示支持位置选择（主驾/副驾/前排/后排/全车）

objects:
  # ── 座椅 ──
  seat:
    operates: [open, close, set, inc, dec]
    attrs: [temperature, speed]
    modes: [heating, ventilation, massage, lumbar_support, 加热, 通风, 按摩, 腰托]
    positions: true
    units: [degree, level, percent]
    online: offline_ok
    drive_restricted: false
    require_confirm: false
    voice_forbidden: false
    projects: [DeepWay, G91, 重汽航天]

  # ── 车窗 ──
  window:
    operates: [open, close, set, inc, dec]
    attrs: [height]
    modes: []
    positions: true
    units: [percent]
    online: offline_ok
    drive_restricted: false
    require_confirm: false
    voice_forbidden: false
    projects: [DeepWay, G91, 重汽航天]

  # ── 天窗 ──
  sunroof:
    operates: [open, close, set, inc, dec]
    attrs: [height]
    modes: []
    positions: false
    units: [percent]
    online: offline_ok
    drive_restricted: false
    require_confirm: false
    voice_forbidden: false
    projects: [DeepWay, G91, 重汽航天]

  # ── 遮阳帘 ──
  sunshade:
    operates: [open, close, set, inc, dec]
