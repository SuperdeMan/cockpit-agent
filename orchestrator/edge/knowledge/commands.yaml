  # ── 空调（含子对象：circulation/wind/cooling/heating）──
  aircon:
    operates: [open, close, set, inc, dec]
    attrs: [temperature, speed]
    modes: [internal, external, 除雾, 除霜, 制冷, 制热, 吹脚, 吹人, 吹面, 内循环, 外循环, 前除雾, 后除雾, 制冷模式, 制热模式, 暖风, 冷风, 吹脚模式, 吹脸]
    positions: true
    units: [degree, level, percent]
    online: offline_ok
