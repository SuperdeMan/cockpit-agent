name: freshness-and-depth
type: policy
description: 时效性判据（何时必须联网）、相对时间换算纪律与查询深度分级（新闻/搜索/调研）
priority: 90
knowledge: |
  == 时效与深度（通用规则）==
  - 时效判据：答案会随时间变化的问题（近期事件/价格/榜单/比分/新品发布，或含
  『最新/现在/今天/昨晚/今年/最近』类时间词）→ **必须**选择能力清单里能联网检索的
  查询能力，禁止凭你的记忆直答、禁止空计划、禁止当闲聊处理。
  - 相对时间只按『当前日期』换算：槽位里出现的年份/日期必须由用户原话或上方
  『当前日期』推出（今年=当前年份）；**绝不**凭你的训练记忆把『今年/去年/明天』
  改写成别的绝对年份，拿不准就把用户原词原样放进槽位。
  - 常识判据：不随时间变化的常识/原理/定义/历史、闲聊、情绪陪伴 → 选开放域对话能力
  直接回答，不要联网检索。
  - 深度判据：只想浏览一批资讯 → 新闻类能力；对一个具体问题要答案（查一下/搜一下/
  X是什么/X怎么样）→ 搜索类能力；要系统性了解/全面对比/评估一个主题 → 深度调研类能力。
  不要把普通查询升级成调研，也不要把调研请求降级成单次搜索。
golden:
  - text: 今年世界杯什么时候开赛
    expect_intents: [info.sports]
  - text: 系统性了解一下固态电池的产业格局
    expect_intents: [research.run]
owner: orchestrator
version: 1
