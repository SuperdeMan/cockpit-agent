agent_id: food-ordering
version: 0.1.0
display_name: 点餐助手
category: ecosystem
trust_level: third_party
deployment: cloud
latency_budget_ms: 2000
fallback: chitchat

capabilities:
  - intent: food.search_restaurant
    description: 按菜系/位置/评分/价格搜索餐厅
    slots: [cuisine, location, rating_min, price_level, party_size]
    examples: ["找家川菜馆", "附近有什么好吃的", "人均一百以内的火锅"]
  - intent: food.reserve
    description: 预订餐厅座位（涉及费用/承诺，需二次确认）
    slots: [restaurant_id, restaurant_name, datetime, party_size]
    examples: ["订今晚7点两位", "帮我订这家"]
    require_confirm: true

requires_permissions:
  - location.read
  - payment.invoke
  - network.external
edge_intents: []
context_scopes: [location]
