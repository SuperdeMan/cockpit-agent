# R4.4 路由歧义澄清评测语料（CLARIFY_ENABLED=on 下评 Planner 是否恰当输出 clarify）。
#
# --clarify --live 把每条 text 拼进带澄清段的 _planner_system() + 真实 catalog 送 llm-gateway，
# 用 _parse_clarify 判 LLM 是否输出了合法澄清。
#
# schema:
#   text:   输入话术
#   expect: clarify = 真歧义（能力清单上 ≥2 合理落法、上下文无法裁决）应出 intent_choice 卡
#           direct  = 明确单意图 / 已有确定性路由，**绝不允许**反问（出 clarify 即 fail）
#   tag:    溯源
#
# 纪律（母卡 D8/§7）：direct 是**硬门槛**——明确句零澄清是回归红线（滥用澄清=打断感）；
# clarify recall 首版只入基线不设硬指标（弱 LLM 偏保守可能少澄清，可接受）。
# direct 集覆盖：历史已修 bug 句（已有确定性路由，退化成澄清=回归）+ 车控/媒体/天气/闲聊明确句。

# ── 应澄清：真歧义（clarify）──────────────────────────────────────────────────
- {text: "帮我看看华润大厦", expect: clarify, tag: landmark_detail_vs_nav}   # 看详情 vs 导航去 vs 附近搜
- {text: "找个充电的地方", expect: clarify, tag: nearby_vs_charging}          # 附近充电站发现 vs 沿途充电规划
- {text: "附近有什么好玩的帮我安排一下", expect: clarify, tag: nearby_vs_trip} # 周边景点发现 vs 行程规划
- {text: "看看东方明珠", expect: clarify, tag: landmark_detail_vs_nav}
- {text: "处理一下停车的事", expect: clarify, tag: parking_pay_vs_find}        # 停车缴费 vs 找停车场
- {text: "我想去趟三里屯", expect: clarify, tag: nav_vs_nearby}               # 导航前往 vs 附近发现

# ── 不得澄清：明确句 / 已有确定性路由（direct，硬门槛，出 clarify 即 fail）─────
- {text: "巴西那场帮我看看详情", expect: direct, tag: fixed_bug_sports}        # 已有 sports route_hint
- {text: "珠海玩两天推荐景点", expect: direct, tag: fixed_bug_trip}            # 已有 trip guard
- {text: "导航去那个像笋一样的楼", expect: direct, tag: fixed_bug_landmark}    # 已有地标解析
- {text: "深入调研一下固态电池技术", expect: direct, tag: research_route_hint}
- {text: "今天杭州天气怎么样", expect: direct, tag: weather}
- {text: "打开空调26度", expect: direct, tag: control}
- {text: "把温度调高两度", expect: direct, tag: control}
- {text: "播放周杰伦的歌", expect: direct, tag: media}
- {text: "讲个笑话", expect: direct, tag: chitchat}
- {text: "导航去东方之门", expect: direct, tag: nav}
- {text: "附近的充电站", expect: direct, tag: nearby}
- {text: "今天有什么新闻", expect: direct, tag: news}
- {text: "从这里到机场大概要多久", expect: direct, tag: query}
- {text: "帮我查下腾讯的股价", expect: direct, tag: stock}
- {text: "现在几点了", expect: direct, tag: query}
- {text: "帮我找家川菜馆", expect: direct, tag: nearby}
- {text: "附近哪里能停车", expect: direct, tag: nearby}
