  # R4.1 P3 B1：气象反例——地点(导航)/云端预警(info.alerts)不得被端侧判成 weather
  - text: 气象局怎么走
    forbid_object: weather
    source: "R4.1 P3 B1 气象反例（气象局=地点，走导航）"
    tags: [weather, hijack, b1]
  - text: 附近的气象局在哪
    forbid_object: weather
    source: "R4.1 P3 B1 气象反例（气象局=地点，走导航）"
