# PoC 全栈一键起。生产部署见 deploy/helm/。
# 服务端口规划见各服务 README；gRPC 服务间通过容器 DNS 互通。
name: car-agent

# This file is included by ../compose.yaml.  Do not invoke it as the first
# Compose file: that would make deploy/ the project directory and bypass root .env.

x-python-env: &python-env
  REGISTRY_ADDR: registry:50051
  LLM_GATEWAY_ADDR: llm-gateway:50052
  MEMORY_ADDR: memory:50053
  CLOUD_PLANNER_ADDR: cloud-planner:50054
  NATS_URL: nats://nats:4222
  REDIS_URL: redis://redis:6379/0
  LOG_LEVEL: ${LOG_LEVEL:-info}
  # 数据真实性严格栈（治理 P2）：on=任何 provider 决议落 mock 即启动失败（含 LLM/embed/ASR/TTS），
  # 演示/验收前翻开；默认 off=CI 与离线开发全 mock 照跑。豁免域见 .env.example。
  REQUIRE_REAL_PROVIDERS: ${REQUIRE_REAL_PROVIDERS:-off}
  REQUIRE_REAL_EXEMPT: ${REQUIRE_REAL_EXEMPT:-parking,knowledge}
  # 开放域模型分层（task 4）：Agent（如 chitchat）据此选快/重模型
  LLM_MODEL_PRIMARY: ${LLM_MODEL_PRIMARY:-mimo-v2.5-pro}
  LLM_MODEL_FAST: ${LLM_MODEL_FAST:-mimo-v2.5}
  PLANNER_LOOP_MAX_ITERS: ${PLANNER_LOOP_MAX_ITERS:-2}
  PLANNER_LOOP_BUDGET_MS: ${PLANNER_LOOP_BUDGET_MS:-5000}
  # 规划失败/预筛保护的全局兜底 Agent（R2.1 P5：去 planning/context 硬编码 chitchat）
  PLANNER_FALLBACK_AGENT: ${PLANNER_FALLBACK_AGENT:-chitchat}
  # R3.2 服务间 mTLS：全 env 门控，默认关（GRPC_TLS 未设/off = insecure，逐字保持现状）。
  GRPC_TLS: ${GRPC_TLS:-off}
  GRPC_TLS_CA: /certs/ca.crt
  GRPC_TLS_CERT: /certs/server.crt
  GRPC_TLS_KEY: /certs/server.key
  GRPC_TLS_SERVER_NAME: ${GRPC_TLS_SERVER_NAME:-cockpit-mesh}
  # badcase 排查（obs.turn/obs.llm/obs.log）：内容级采集门控（量产必须 off）与日志上报门槛
  OBS_CONTENT_CAPTURE: ${OBS_CONTENT_CAPTURE:-on}
  LOG_SHIP_LEVEL: ${LOG_SHIP_LEVEL:-WARNING}

# 生存性：所有长驻服务 crash/OOM 后自动拉起（演示/长跑不因单点退出而中断）。
# unless-stopped = 除非人工 stop，否则始终重启（含 docker daemon 重启后）。
# 顺带全栈日志轮转（借同一 anchor 零逐服务改动）：json-file 无上限会让长跑演示机
# 磁盘无限膨胀；观测日志已进 collector SQLite，容器 stdout 只留近期窗口。
x-restart: &restart
  restart: unless-stopped
  logging:
    driver: json-file
    options:
      max-size: "10m"
      max-file: "3"

# R3.2 mTLS 证书挂载：无条件挂到 gRPC mesh 服务（GRPC_TLS 关时代码不读、无害）。
# 源 ../certs（相对 deploy/ 项目目录=仓库根 certs），由 scripts/gen-certs.* 生成、gitignore。
x-certs-vol: &certs-vol
  - ../certs:/certs:ro

services:
  # ── 基础设施 ──
  redis:
    <<: *restart
    image: redis:7-alpine
    ports: ["6379:6379"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      timeout: 1s
      retries: 10

  nats:
    <<: *restart
    image: nats:2-alpine
    command: ["-js", "-m", "8222"]
    ports: ["4222:4222"]
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8222/healthz"]
      interval: 2s
      timeout: 1s
      retries: 10

  postgres:
    <<: *restart
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: cockpit
      POSTGRES_PASSWORD: cockpit
      POSTGRES_DB: cockpit
    ports: ["5432:5432"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cockpit -d cockpit"]
      interval: 2s
      timeout: 2s
      retries: 15

  # ws8 P1: HTTP 代理（网络白名单）——third-party Agent 出站 HTTP 经此代理
  http-proxy:
    <<: *restart
    # 第三方 Agent 出站正向代理（CONNECT 隧道 + 域名白名单默认拒绝）。原 envoy 配置是反向代理、
    # 不支持 HTTPS CONNECT，作 HTTP_PROXY 用时全失败 → 改用 deploy/egress-proxy.py（纯 stdlib，
    # 跑在已有 python:3.11-slim，不引新镜像）。envoy-proxy.yaml 留作历史参考。见设计文档 §11。
    image: python:3.11-slim
    volumes:
      - ./egress-proxy.py:/app/egress-proxy.py:ro
    environment:
      # 出站白名单：仅已接入的可信厂商域名（新增真实 provider 时在此追加）
      EGRESS_ALLOW: "restapi.amap.com,devapi.qweather.com,api.tushare.pro,serpapi.com,api.anysearch.com"
    command: ["python", "/app/egress-proxy.py"]
    ports: ["8082:8080"]

  # ── 云侧核心 ──
  registry:
    <<: *restart
    build: { context: .., dockerfile: registry/Dockerfile }
    volumes: *certs-vol
    environment:
      NATS_URL: nats://nats:4222
      LOG_LEVEL: ${LOG_LEVEL:-info}
      POSTGRES_DSN: postgresql://cockpit:cockpit@postgres:5432/cockpit
      # R4.1 P0 语义路由：capability 向量 embedding 经 llm-gateway（→百炼 text-embedding-v4，
      # 与 memory 同源），维度须与 LLM_EMBED_DIMENSIONS 一致。不加 depends_on llm-gateway：
      # 启动时序由 store 的按需重探兜底（无 embed 源时诚实降级关键词路径）。
      LLM_GATEWAY_ADDR: llm-gateway:50052
      LLM_EMBED_DIMENSIONS: ${LLM_EMBED_DIMENSIONS:-1024}
      # 长期不健康自动剔除：连续探测失败达此值（5s/轮 ≈ 10 分钟）整体注销，改名/下线
      # 残留（如 food-ordering→nearby）不再永生刷告警；活 Agent 10s 重注册自动豁免。0=禁用
      REGISTRY_EVICT_FAIL_COUNT: ${REGISTRY_EVICT_FAIL_COUNT:-120}
      # R3.2 服务间 mTLS（默认关）
      GRPC_TLS: ${GRPC_TLS:-off}
      GRPC_TLS_CA: /certs/ca.crt
      GRPC_TLS_CERT: /certs/server.crt
      GRPC_TLS_KEY: /certs/server.key
      GRPC_TLS_SERVER_NAME: ${GRPC_TLS_SERVER_NAME:-cockpit-mesh}
    ports: ["50051:50051"]
    depends_on:
      nats:
        condition: service_healthy
      postgres:
        condition: service_healthy
    # P1 多实例：replicas: 2（PostgreSQL UPSERT 天然幂等，多实例写同一行安全）
    deploy:
      replicas: ${REGISTRY_REPLICAS:-1}

  llm-gateway:
    <<: *restart
    build: { context: .., dockerfile: llm-gateway/Dockerfile }
    volumes: *certs-vol
    environment:
      <<: *python-env
      LLM_PROVIDER: ${LLM_PROVIDER:-xiaomimimo}
      LLM_API_KEY: ${LLM_API_KEY:-}
      # OpenAI 兼容服务商可切换端点/鉴权/思考开关，换服务商只改 .env（详见 .env.example）
      LLM_BASE_URL: ${LLM_BASE_URL:-}
      LLM_AUTH_STYLE: ${LLM_AUTH_STYLE:-api-key}
      LLM_DISABLE_THINKING: ${LLM_DISABLE_THINKING:-true}
      LLM_MODEL_PRIMARY: ${LLM_MODEL_PRIMARY:-mimo-v2.5-pro}
      LLM_MODEL_FALLBACK: ${LLM_MODEL_FALLBACK:-mimo-v2.5}
      # 多 LLM 源（HMI 设置页两级切换：厂商→模型，全局生效，默认 LLM_PROVIDER）：每家填 key 即出现在
      # 切换入口（未填置灰）。qwen(阿里百炼) 复用下面的 LLM_EMBED_API_KEY/DASHSCOPE_ASR_KEY，无需单独 key。
      MINIMAX_API_KEY: ${MINIMAX_API_KEY:-}
      MINIMAX_LLM_MODEL: ${MINIMAX_LLM_MODEL:-MiniMax-M3}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      DEEPSEEK_MODEL_PRIMARY: ${DEEPSEEK_MODEL_PRIMARY:-deepseek-v4-pro}
      DEEPSEEK_MODEL_FAST: ${DEEPSEEK_MODEL_FAST:-deepseek-v4-flash}
      DASHSCOPE_LLM_KEY: ${DASHSCOPE_LLM_KEY:-}
      QWEN_MODEL_PRIMARY: ${QWEN_MODEL_PRIMARY:-qwen3.7-max}
      QWEN_MODEL_FAST: ${QWEN_MODEL_FAST:-qwen3.7-plus}
      # T3.5 e2e_degrade.py 测试钩子：MockProvider 人为延迟（ms），默认 0=零行为变化；
      # 仅该脚本「LLM 超时」用例会用 shell env 临时覆盖调大（不写入 .env，沿用
      # e2e_auth.py 已确立的"临时 env 覆盖，不改 .env"惯例）。
      LLM_MOCK_DELAY_MS: ${LLM_MOCK_DELAY_MS:-0}
      # Embedding（记忆语义检索）：默认阿里云百炼 text-embedding-v4（1024 维）。
      # 仅需在根 .env 填 LLM_EMBED_API_KEY=<百炼 key>；其余有默认值。
      LLM_EMBED_URL: ${LLM_EMBED_URL:-https://dashscope.aliyuncs.com/compatible-mode/v1/embeddings}
      LLM_EMBED_MODEL: ${LLM_EMBED_MODEL:-text-embedding-v4}
      LLM_EMBED_API_KEY: ${LLM_EMBED_API_KEY:-}
      LLM_EMBED_AUTH_STYLE: ${LLM_EMBED_AUTH_STYLE:-bearer}
      LLM_EMBED_DIMENSIONS: ${LLM_EMBED_DIMENSIONS:-1024}
      # 流式 ASR（实时识别上屏）：dashscope（OpenAI Realtime，默认，复用百炼 LLM_EMBED_API_KEY）| mimo-chunked | off
      ASR_STREAM_PROVIDER: ${ASR_STREAM_PROVIDER:-dashscope}
      DASHSCOPE_ASR_KEY: ${DASHSCOPE_ASR_KEY:-}
      DASHSCOPE_ASR_WS_URL: ${DASHSCOPE_ASR_WS_URL:-wss://dashscope.aliyuncs.com/api-ws/v1/realtime}
      DASHSCOPE_ASR_INFERENCE_WS_URL: ${DASHSCOPE_ASR_INFERENCE_WS_URL:-wss://dashscope.aliyuncs.com/api-ws/v1/inference}
      ASR_STREAM_MODEL: ${ASR_STREAM_MODEL:-qwen3-asr-flash-realtime-2026-02-10}
      ASR_MODEL: ${ASR_MODEL:-mimo-v2.5-asr}
      AUDIO_HTTP_PORT: "50059"
      # 批处理 ASR/TTS 引擎（/api/asr、/api/tts + gRPC 面，启动时装配）：auto=LLM_PROVIDER 为
      # MiMo 系→MiMo，否则桥接对应流式引擎（不用 MiMo 时批处理不再哑成 mock）。
      # 可显式钉：ASR_PROVIDER=mimo|dashscope|mock；TTS_PROVIDER=mimo|cosyvoice|qwen|minimax|mock
      ASR_PROVIDER: ${ASR_PROVIDER:-auto}
      TTS_PROVIDER: ${TTS_PROVIDER:-auto}
      TTS_MODEL: ${TTS_MODEL:-mimo-v2.5-tts}
      # MiMo 音频端点（批/流式 ASR/TTS 共用；与 chat 的 LLM_BASE_URL 独立），空=官方集群
      MIMO_AUDIO_BASE_URL: ${MIMO_AUDIO_BASE_URL:-}
      TTS_VOICE_ID: ${TTS_VOICE_ID:-冰糖}
      # 流式 TTS（服务端 PCM 流式合成，R4.2）：cosyvoice（run-task，默认，复用百炼 key）| qwen（realtime，含方言）
      #   | mimo（MiMo v2.5 流式，复用 LLM_API_KEY）| minimax（T2A 流式，复用 MINIMAX_API_KEY）| mock | off
      TTS_STREAM_PROVIDER: ${TTS_STREAM_PROVIDER:-cosyvoice}
      TTS_STREAM_MODEL: ${TTS_STREAM_MODEL:-}
      TTS_STREAM_VOICE: ${TTS_STREAM_VOICE:-}
      DASHSCOPE_TTS_INFERENCE_WS_URL: ${DASHSCOPE_TTS_INFERENCE_WS_URL:-wss://dashscope.aliyuncs.com/api-ws/v1/inference}
      DASHSCOPE_TTS_REALTIME_WS_URL: ${DASHSCOPE_TTS_REALTIME_WS_URL:-wss://dashscope.aliyuncs.com/api-ws/v1/realtime}
      # MiniMax TTS（与 MiniMax LLM 同 MINIMAX_API_KEY）：模型/默认音色/T2A 端点
      MINIMAX_TTS_MODEL: ${MINIMAX_TTS_MODEL:-speech-2.8-turbo}
      MINIMAX_TTS_VOICE: ${MINIMAX_TTS_VOICE:-female-tianmei}
      MINIMAX_T2A_URL: ${MINIMAX_T2A_URL:-https://api.minimaxi.com/v1/t2a_v2}
    ports: ["50052:50052", "50059:50059"]
    depends_on: [redis]

  memory:
    <<: *restart
    build: { context: .., dockerfile: memory/Dockerfile }
    volumes: *certs-vol
    environment:
      <<: *python-env
      POSTGRES_DSN: postgresql://cockpit:cockpit@postgres:5432/cockpit
      EMBED_DIM: ${EMBED_DIM:-1024}   # 须与 LLM_EMBED_DIMENSIONS 一致（百炼 v4 默认 1024）
      # 合成会话（eval/e2e/badcase 重放/探针）按 session_id 前缀跳过 LLM 抽取巩固：
      # 不烧 token、不污染真实用户画像；记忆管线自测用 memtest- 前缀（不在此列）
      MEMORY_EXTRACT_SKIP_PREFIXES: ${MEMORY_EXTRACT_SKIP_PREFIXES:-eval-,e2e-,ctxe2e-,central-,review-,nightly-,replay-,probe-,smoke-}
    ports: ["50053:50053"]
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy

  cloud-planner:
    <<: *restart
    build: { context: .., dockerfile: orchestrator/cloud/Dockerfile }
    volumes: *certs-vol
    environment:
      <<: *python-env
      # R4.4 拒识/澄清门控：REJECT 默认 on（作用域被 hands-free + input_source 双重限定，
      # 显式输入永不拒）；CLARIFY 默认 on（2026-07-08 真栈 CDP 全流程验收通过后翻 on：歧义句出卡
      # →点选消歧指令派发→深度=1 不再澄清；反例误澄清 0/17）；FALLBACK_MIN = 语义 top-1 分数门槛。
      REJECT_NON_ADDRESSED: ${REJECT_NON_ADDRESSED:-on}
      CLARIFY_ENABLED: ${CLARIFY_ENABLED:-on}
      CLARIFY_FALLBACK_MIN: ${CLARIFY_FALLBACK_MIN:-0.5}
    ports: ["50054:50054"]
    depends_on: [registry, llm-gateway, memory]

  payment-gateway:
    <<: *restart
    build: { context: .., dockerfile: payment-gateway/Dockerfile }
    volumes: *certs-vol
    environment:
      <<: *python-env
      PAYMENT_PORT: "50071"
    ports: ["50071:50071"]
    depends_on: [redis]

  # ── Agents ──
  navigation-agent:
    <<: *restart
    build: { context: .., dockerfile: agents/navigation/Dockerfile }
    volumes: *certs-vol
    environment:
      <<: *python-env
      AGENT_PORT: "50061"
      # 真实 POI provider（高德）；不配 key 走 mock。key 只注入本服务（最小化）。
      POI_VENDOR: ${POI_VENDOR:-mock}
      AMAP_KEY: ${AMAP_KEY:-}
    depends_on: [registry, llm-gateway]

  chitchat-agent:
    <<: *restart
    build: { context: .., dockerfile: agents/chitchat/Dockerfile }
    volumes: *certs-vol
    environment:
      <<: *python-env
      AGENT_PORT: "50062"
    depends_on: [registry, llm-gateway]

  nearby-agent:
    <<: *restart
    build: { context: .., dockerfile: agents/nearby/Dockerfile }
    volumes: *certs-vol
    environment:
      <<: *python-env
      AGENT_PORT: "50063"
      # 真实周边 provider（高德 POI 2.0）；不配 key 走 mock。key 只注入本服务（最小化）。
      # 出站经 http-proxy 正向代理（CONNECT + 域名白名单，见 deploy/egress-proxy.py）：第三方
      # Agent 只能访问白名单厂商域名（restapi.amap.com 已放行），越权域名被 403。
      POI_VENDOR: ${POI_VENDOR:-mock}
      AMAP_KEY: ${AMAP_KEY:-}
      HTTP_PROXY: http://http-proxy:8080
      HTTPS_PROXY: http://http-proxy:8080
    depends_on: [registry, llm-gateway, memory, http-proxy]
    # ws8 P1: third-party Agent 沙箱（资源限制 + 只读文件系统 + no-new-privileges + 出站白名单代理）
    read_only: true
    security_opt: [no-new-privileges]
    mem_limit: 256m
    cpus: 0.5

  parking-payment-agent:
    <<: *restart
    build: { context: .., dockerfile: agents/parking_payment/Dockerfile }
    volumes: *certs-vol
    environment:
      <<: *python-env
      AGENT_PORT: "50064"
      HTTP_PROXY: http://http-proxy:8080
      HTTPS_PROXY: http://http-proxy:8080
    depends_on: [registry, llm-gateway, memory, http-proxy]
    # ws8 P1: third-party Agent 沙箱
    read_only: true
    security_opt: [no-new-privileges]
    mem_limit: 256m
    cpus: 0.5

  manual-rag-agent:
    <<: *restart
    build: { context: .., dockerfile: agents/manual_rag/Dockerfile }
    volumes: *certs-vol
    environment:
      <<: *python-env
      AGENT_PORT: "50065"
    depends_on: [registry, llm-gateway]

  trip-planner-agent:
    <<: *restart
    build: { context: .., dockerfile: agents/trip_planner/Dockerfile }
    volumes: *certs-vol
    environment:
      <<: *python-env
      AGENT_PORT: "50066"
      # 进程内复用导航高德 provider：接地景点 POI、算 leg 路线、按 SoC 搜沿途充电站；不配走 mock。
      POI_VENDOR: ${POI_VENDOR:-mock}
      AMAP_KEY: ${AMAP_KEY:-}
      # 天气联动（#3）：进程内复用 info 和风 provider 结合目的地预报规划；不配走 mock（天气优雅缺省）。
      WEATHER_VENDOR: ${WEATHER_VENDOR:-mock}
      QWEATHER_HOST: ${QWEATHER_HOST:-devapi.qweather.com}
      QWEATHER_PROJECT_ID: ${QWEATHER_PROJECT_ID:-}
      QWEATHER_KEY_ID: ${QWEATHER_KEY_ID:-}
      QWEATHER_PRIVATE_KEY: ${QWEATHER_PRIVATE_KEY:-}
      QWEATHER_PRIVATE_KEY_PATH: ${QWEATHER_PRIVATE_KEY_PATH:-}
      QWEATHER_KEY: ${QWEATHER_KEY:-}
    depends_on: [registry, llm-gateway]

  info-agent:
    <<: *restart
    build: { context: .., dockerfile: agents/info/Dockerfile }
    volumes: *certs-vol
    environment:
      <<: *python-env
      AGENT_PORT: "50067"
      # 真实天气 provider（和风）；不配走 mock。鉴权 JWT 优先，否则 API Key。凭证只注入本服务。
      WEATHER_VENDOR: ${WEATHER_VENDOR:-mock}
      QWEATHER_HOST: ${QWEATHER_HOST:-devapi.qweather.com}
      QWEATHER_PROJECT_ID: ${QWEATHER_PROJECT_ID:-}
      QWEATHER_KEY_ID: ${QWEATHER_KEY_ID:-}
      QWEATHER_PRIVATE_KEY: ${QWEATHER_PRIVATE_KEY:-}
      QWEATHER_PRIVATE_KEY_PATH: ${QWEATHER_PRIVATE_KEY_PATH:-}
      QWEATHER_KEY: ${QWEATHER_KEY:-}
      # 仅用于把已授权定位坐标反查为天气卡可读地点；未配置时展示“当前位置”。
      AMAP_KEY: ${AMAP_KEY:-}
      # 联网搜索（优先 Exa 正文级检索，降级 AnySearch→Bing）；不配走 mock
      EXA_API_KEY: ${EXA_API_KEY:-}
      EXA_BASE_URL: ${EXA_BASE_URL:-https://api.exa.ai}
      ANYSEARCH_API_KEY: ${ANYSEARCH_API_KEY:-}
      ANYSEARCH_BASE_URL: ${ANYSEARCH_BASE_URL:-https://api.anysearch.com}
      BING_SEARCH_KEY: ${BING_SEARCH_KEY:-}
      # 新闻（SerpApi: Google+Baidu News，AnySearch 兜底）；不配走 mock
      SERPAPI_API_KEY: ${SERPAPI_API_KEY:-}
      NEWS_API_KEY: ${NEWS_API_KEY:-}
      # 赛事（api-football：实时比分/赛程，league=1 世界杯）；不配走 mock
      API_FOOTBALL_KEY: ${API_FOOTBALL_KEY:-}
      API_FOOTBALL_HOST: ${API_FOOTBALL_HOST:-v3.football.api-sports.io}
      # 股票行情（Tushare 免费 API）；不配走 mock
      TUSHARE_TOKEN: ${TUSHARE_TOKEN:-}
      STOCK_API_KEY: ${STOCK_API_KEY:-}
    # JWT 用文件私钥时取消下面注释，把宿主机 PEM 挂进容器（路径与 QWEATHER_PRIVATE_KEY_PATH 一致）：
    # volumes:
    #   - ${QWEATHER_PRIVATE_KEY_PATH}:${QWEATHER_PRIVATE_KEY_PATH}:ro
    depends_on: [registry, llm-gateway]

  deep-research-agent:
    <<: *restart
    build: { context: .., dockerfile: agents/deep_research/Dockerfile }
    volumes: *certs-vol
    environment:
      <<: *python-env
      AGENT_PORT: "50073"
      # 进程内复用 info 的搜索 provider（Exa 正文级→AnySearch→Bing→mock）做有界迭代检索；不配走 mock
      EXA_API_KEY: ${EXA_API_KEY:-}
      EXA_BASE_URL: ${EXA_BASE_URL:-https://api.exa.ai}
      ANYSEARCH_API_KEY: ${ANYSEARCH_API_KEY:-}
      ANYSEARCH_BASE_URL: ${ANYSEARCH_BASE_URL:-https://api.anysearch.com}
      BING_SEARCH_KEY: ${BING_SEARCH_KEY:-}
    depends_on: [registry, llm-gateway]

  reminder-agent:
    <<: *restart
    build: { context: .., dockerfile: agents/reminder/Dockerfile }
    volumes: *certs-vol
    environment:
      <<: *python-env
      AGENT_PORT: "50074"
      # PG 持久 + 到点调度（无 PG 内存降级重启丢失；无 NATS 仅日志不推送）
      POSTGRES_DSN: postgresql://cockpit:cockpit@postgres:5432/cockpit
      REMINDER_POLL_S: ${REMINDER_POLL_S:-5}
      REMINDER_TZ: ${REMINDER_TZ:-Asia/Shanghai}
    depends_on: [registry, llm-gateway, memory, postgres, nats]

  charging-planner-agent:
    <<: *restart
    build: { context: .., dockerfile: agents/charging_planner/Dockerfile }
    volumes: *certs-vol
    environment:
      <<: *python-env
      AGENT_PORT: "50068"
      # 高德：充电站 POI 搜索 + 路线距离/时长（真实充能规划）；不配走 mock
      AMAP_KEY: ${AMAP_KEY:-}
    depends_on: [registry, llm-gateway, memory]

  scene-orchestrator-agent:
    <<: *restart
    build: { context: .., dockerfile: agents/scene_orchestrator/Dockerfile }
    volumes: *certs-vol
    environment:
      <<: *python-env
      AGENT_PORT: "50069"
      # 用户自建场景 PG 持久（无 PG 内存降级、重启丢失）；车况镜像/主动建议走 NATS
      # （无 NATS：退出场景改走反向默认表恢复，不影响激活主链路）
      POSTGRES_DSN: postgresql://cockpit:cockpit@postgres:5432/cockpit
    depends_on: [registry, llm-gateway, memory, postgres, nats]

  road-safety-agent:
    <<: *restart
    build: { context: .., dockerfile: agents/road_safety/Dockerfile }
    volumes: *certs-vol
    environment:
      <<: *python-env
      AGENT_PORT: "50072"
    depends_on: [registry, llm-gateway]

  observability-collector:
    <<: *restart
    build: { context: .., dockerfile: observability/collector/Dockerfile }
    environment:
      NATS_URL: nats://nats:4222
      OBS_COLLECTOR_PORT: "8092"
      DEBUG_VEHICLE_CONTROL: ${DEBUG_VEHICLE_CONTROL:-true}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      # badcase 排查持久层：turns/spans/llm/logs 落 SQLite（named volume，重启不丢）
      OBS_DB_PATH: /data/obs.db
      OBS_RETENTION_DAYS: ${OBS_RETENTION_DAYS:-7}
    volumes:
      - obs-data:/data
    ports: ["8092:8092"]
    depends_on:
      nats:
        condition: service_healthy

  # T3.6：Prometheus/Grafana 导出，profile 门控——默认 `docker compose up`/`make up` 不起，
  # 需 `docker compose --profile observability up -d prometheus grafana` 显式启用。
  prometheus:
    <<: *restart
    image: prom/prometheus:v3.13.0
    profiles: ["observability"]
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports: ["9090:9090"]
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9090/-/healthy"]
      interval: 5s
      timeout: 2s
      retries: 10
    depends_on: [observability-collector]

  grafana:
    <<: *restart
    image: grafana/grafana:12.3.8
    profiles: ["observability"]
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports: ["3000:3000"]
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/health || exit 1"]
      interval: 5s
      timeout: 2s
      retries: 10
    depends_on: [prometheus]

  # ── 接入层 ──
  cloud-gateway:
    <<: *restart
    build: { context: .., dockerfile: gateway/cloud/Dockerfile }
    volumes: *certs-vol
    environment:
      CLOUD_PLANNER_ADDR: cloud-planner:50054
      LOG_LEVEL: ${LOG_LEVEL:-info}
      # R3.1 层 2（通道鉴权）；默认关，逐字保持现状。
      AUTH_REQUIRED: ${AUTH_REQUIRED:-false}
      CLOUD_CHANNEL_TOKENS: ${CLOUD_CHANNEL_TOKENS:-}
      # R3.2 服务间 mTLS（默认关；Go 侧经 gateway/tlscfg 读取）
      GRPC_TLS: ${GRPC_TLS:-off}
      GRPC_TLS_CA: /certs/ca.crt
      GRPC_TLS_CERT: /certs/server.crt
      GRPC_TLS_KEY: /certs/server.key
      GRPC_TLS_SERVER_NAME: ${GRPC_TLS_SERVER_NAME:-cockpit-mesh}
    ports: ["8080:8080"]
    depends_on: [cloud-planner]

  edge-gateway:
    <<: *restart
    build: { context: .., dockerfile: gateway/edge/Dockerfile }
    volumes: *certs-vol
    environment:
      EDGE_GATEWAY_PORT: "8090"
      EDGE_ORCHESTRATOR_ADDR: edge-orchestrator:50070
      NATS_URL: nats://nats:4222   # 主动建议（agent.proactive）→ HMI WS 投递
      LOG_LEVEL: ${LOG_LEVEL:-info}
      # R3.1 层 1（用户/请求鉴权）；默认关，逐字保持现状。
      AUTH_REQUIRED: ${AUTH_REQUIRED:-false}
      AUTH_TOKENS: ${AUTH_TOKENS:-}
      AUTH_DEFAULT_USER_ID: ${AUTH_DEFAULT_USER_ID:-u1}
      VEHICLE_ID: ${VEHICLE_ID:-v1}
      # R3.2 服务间 mTLS（默认关；Go 侧经 gateway/tlscfg 读取）
      GRPC_TLS: ${GRPC_TLS:-off}
      GRPC_TLS_CA: /certs/ca.crt
      GRPC_TLS_CERT: /certs/server.crt
      GRPC_TLS_KEY: /certs/server.key
      GRPC_TLS_SERVER_NAME: ${GRPC_TLS_SERVER_NAME:-cockpit-mesh}
    ports: ["8090:8090"]
    depends_on: [edge-orchestrator, nats]

  edge-orchestrator:
    <<: *restart
    # 端侧编排器：内含 Fast Intent + 端侧车控/媒体 Agent + 模拟 VAL（PoC 简化为单进程）
    build: { context: .., dockerfile: orchestrator/edge/Dockerfile }
    volumes: *certs-vol
    environment:
      CLOUD_GATEWAY_ADDR: cloud-gateway:8080
      NATS_URL: nats://nats:4222
      FAST_INTENT_THRESHOLD_HIGH: ${FAST_INTENT_THRESHOLD_HIGH:-0.85}
      FAST_INTENT_THRESHOLD_LOW: ${FAST_INTENT_THRESHOLD_LOW:-0.5}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      # R3.1 层 2（通道鉴权）：Hello 携带的 channel token；默认空 → 云侧默认放行。
      VEHICLE_ID: ${VEHICLE_ID:-v1}
      CLOUD_CHANNEL_TOKEN: ${CLOUD_CHANNEL_TOKEN:-}
      # R3.2 服务间 mTLS（默认关）
      GRPC_TLS: ${GRPC_TLS:-off}
      GRPC_TLS_CA: /certs/ca.crt
      GRPC_TLS_CERT: /certs/server.crt
      GRPC_TLS_KEY: /certs/server.key
      GRPC_TLS_SERVER_NAME: ${GRPC_TLS_SERVER_NAME:-cockpit-mesh}
    ports: ["50070:50070"]
    depends_on:
      cloud-gateway:
        condition: service_started
      nats:
        condition: service_healthy

  # ── 前端 ──
  hmi:
    <<: *restart
    build: { context: ../hmi, dockerfile: Dockerfile }
    environment:
      VITE_EDGE_GATEWAY_URL: http://localhost:8090
      VITE_AUDIO_API_URL: http://localhost:50059
      # R3.1 会话鉴权：带 token 连接 WS（默认空=不带 token，保持现状）。
      VITE_WS_TOKEN: ${VITE_WS_TOKEN:-}
    ports: ["5173:5173"]
    depends_on: [edge-gateway]

  dashboard:
    <<: *restart
    build: { context: .., dockerfile: dashboard/Dockerfile }
    environment:
      VITE_COLLECTOR_URL: http://localhost:8092
      VITE_EDGE_GATEWAY_URL: http://localhost:8090
    ports: ["5174:5174"]
    depends_on: [observability-collector, edge-gateway]

# 观测持久层（collector SQLite）：badcase 轮次/链路/日志跨重启保留
volumes:
  obs-data:
