# R4.1 P1 Registry Resolve 路由 golden 用例（经 `--dump` 对真实 agents/*/manifest.yaml 校准）。
#   expect_top1:   期望 top-1 agent_id（召回桶 resolve_recall）。
#   forbid_top1:   该 agent 不得为 top-1（反例桶 resolve_guardrail）。
#   requires_embed: true = 关键词字符打分做不到、需 P0 真语义（离线跳过，`--semantic` 直连活栈跑）。
# 离线关键词层（requires_embed 缺省/false）是 CI 可复现基线，已校准为全 PASS；
# requires_embed:true 的 5 条需活栈真语义（离线关键词做不到）——曾是「关键词遮蔽」的可见样本，
# R4.1 语义重排（server.py SEMANTIC_PROMOTE_SIM）后 `--semantic` 完整路径已 15/20→20/20（含这 5 条）。

# ── 召回：关键词字符打分即可路由到对的 Agent（离线基线，全 PASS）──
- text: 今天天气怎么样
  expect_top1: info
- text: 查一下茅台的股价
  expect_top1: info
- text: 附近哪里有充电桩
  expect_top1: charging-planner
- text: 帮我规划一个三天的旅行行程
  expect_top1: trip-planner
- text: 深入研究一下人工智能的发展趋势
  expect_top1: deep-research
- text: 打开露营模式
  expect_top1: scene-orchestrator
- text: 导航去北京南站
  expect_top1: navigation
- text: 讲个笑话
  expect_top1: chitchat
- text: 帮我订一家川菜馆
  expect_top1: nearby
- text: 附近有什么好吃的餐厅
  expect_top1: nearby
- text: 帮我把这次自驾游的路线安排一下
  expect_top1: trip-planner

# ── 反例：车控/媒体/闲聊 query 不得被吸走到交易类（parking-payment）──
- text: 打开空调
  forbid_top1: parking-payment
  tags: [vehicle_control]
- text: 把音量调大一点
  forbid_top1: parking-payment
  tags: [media]
- text: 你好呀最近怎么样
  forbid_top1: parking-payment
  tags: [chitchat]
- text: 随便跟我聊聊天
  forbid_top1: parking-payment
  tags: [chitchat]

# ── 语义需求：关键词 top-1 落到无关 Agent，需 P0 真语义纠正（离线跳过，--semantic 验证）──
- text: 找个停车场                       # 停车场发现归 nearby（真高德 POI）；parking-payment 只做缴费
  expect_top1: nearby
  requires_embed: true
- text: 查一下车辆说明书怎么换轮胎        # 关键词→deep-research
  expect_top1: manual-rag
  requires_embed: true
- text: 我的电动车快没电了想找地方补能    # 关键词→deep-research（「补能」≠「充电」字面）
  expect_top1: charging-planner
  requires_embed: true
- text: 帮我找个川菜馆订位子             # 关键词→navigation
  expect_top1: nearby
  requires_embed: true
- text: 有什么最近值得关注的大事         # 关键词→nearby
  expect_top1: info
  requires_embed: true
