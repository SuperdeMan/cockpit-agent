# ws8 P1: HTTP 代理配置（网络白名单）
# third-party Agent 出站 HTTP 经此代理，只允许访问白名单域名。
#
# 使用方式：
#   ENABLE_PROXY=true docker compose --profile proxy up
#   Agent 环境变量设置 HTTP_PROXY=http://http-proxy:8080

admin:
  address:
    socket_address:
      address: 0.0.0.0
      port_value: 9901

static_resources:
  listeners:
    - name: http_proxy
      address:
        socket_address:
          address: 0.0.0.0
          port_value: 8080
      filter_chains:
        - filters:
            - name: envoy.filters.network.http_connection_manager
              typed_config:
                "@type": type.googleapis.com/envoy.extensions.filters.network.http_connection_manager.v3.HttpConnectionManager
                stat_prefix: http_proxy
                http_filters:
                  - name: envoy.filters.http.router
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.filters.http.router.v3.Router
                route_config:
                  virtual_hosts:
                    - name: allowed_domains
                      domains: ["*"]
                      routes:
                        - match:
                            prefix: "/"
                          route:
                            cluster: upstream
                            timeout: 10s

  clusters:
    - name: upstream
      type: STRICT_DNS
      lb_policy: ROUND_ROBIN
      load_assignment:
        cluster_name: upstream
        endpoints:
          - lb_endpoints:
              - endpoint:
                  address:
                    socket_address:
                      address: restapi.amap.com
                      port_value: 443
              - endpoint:
                  address:
                    socket_address:
                      address: api.anysearch.com
                      port_value: 443
              - endpoint:
                  address:
                    socket_address:
                      address: serpapi.com
                      port_value: 443
              - endpoint:
                  address:
                    socket_address:
                      address: devapi.qweather.com
                      port_value: 443
              - endpoint:
                  address:
                    socket_address:
                      address: api.tushare.pro
                      port_value: 443
      transport_socket:
        name: envoy.transport_sockets.tls
        typed_config:
          "@type": type.googleapis.com/envoy.extensions.transport_sockets.tls.v3.UpstreamTlsContext
          sni: "*.com"
