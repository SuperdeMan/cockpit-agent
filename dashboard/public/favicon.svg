<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- 可观测台 favicon：暗色圆角面板 + trace 脉冲线（配色取自 dashboard 控制台色系
       teal #2fe0c8 / blue #60a5fa / purple #a78bfa），与 HMI 小舟光球图标区分标签页 -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0e1728"/>
      <stop offset="100%" stop-color="#081018"/>
    </linearGradient>
    <linearGradient id="pulse" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#2fe0c8"/>
      <stop offset="55%" stop-color="#60a5fa"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
  </defs>
  <rect x="2" y="2" width="60" height="60" rx="14" fill="url(#bg)" stroke="#2fe0c8" stroke-opacity=".4" stroke-width="1.5"/>
  <path d="M10 36 h9 l5.5 -14 8 24 6 -18 4 8 h9" fill="none" stroke="url(#pulse)" stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="53" cy="36" r="3.2" fill="#2fe0c8"/>
</svg>
