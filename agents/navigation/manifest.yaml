agent_id: navigation
version: 0.1.0
display_name: 导航助手
category: core
trust_level: first_party
deployment: cloud
latency_budget_ms: 5000
fallback: chitchat

capabilities:
  - intent: navigation.search_poi
    description: 按关键词/类别/位置搜索 POI（餐厅、充电站、加油站、停车场等）
    slots: [keyword, category, near, rating_min]
    examples: ["附近的充电站", "找个评分高的川菜馆", "最近的加油站在哪"]
  - intent: navigation.navigate_to
    description: 导航到指定目的地；可顺路停靠（stop_category=吃饭/咖啡…→给候选让用户选）或带途经点（waypoint=已选停靠点名）
    slots: [destination, stop_category, waypoint]
    examples: ["导航去公司", "带我去首都机场", "回家", "导航去东方之门，附近找个吃饭的地方", "导航去东方之门途经肯德基"]
  - intent: navigation.reverse_geocode
    description: 逆地理编码，根据坐标获取地址信息
    slots: [lng, lat]
    examples: ["这是哪里", "当前在什么位置", "这个坐标是什么地方"]
  - intent: navigation.poi_detail
    description: 查询某个 POI 的详细信息
    slots: [poi_id]
    examples: ["这个地方的详细信息", "查一下这个地点"]

requires_permissions:
  - location.read
  - navigation.control
edge_intents: []
