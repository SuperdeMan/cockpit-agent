# 四模式路由评测语料（chitchat 直答 / info.search 联网 / info.news 新闻 / research.run 深调研）。
# 设计：docs/design/2026-07-12-mode-routing-and-answer-quality.md §P0-1
#
# 与 route_hints_cases.yaml 的分工：那份只测 RouteHintEngine 确定性层；本份测**主路径端到端
# 口径**（Planner LLM + route_hints 后验的最终 intent），另带一个可离线复跑的确定性子集。
#
# schema:
#   text:              输入话术
#   tags:              [分桶, ...]；分桶 ∈ mode_typical|mode_boundary|mode_adversarial|
#                      mode_followup|mode_guardrail（首个 tag 即分桶）
#   expect_mode:       --live 期望模式；"a|b" 表示两者皆算 PASS（对抗例的合法双落点）。
#                      取值 chitchat|search|news|research|sports|weather|stock|none|clarify
#                      |other:<intent>（多值时 _mode_of 归一见 eval_mode_routing.py）
#   expect_intents:    可选，--live 期望最终 intent 列表（集合比较、不计顺序；给出时优先于 expect_mode）
#   live:              可选，false=只进离线确定性子集（如依赖 edge 能力、云 catalog 缺席的用例）
#   history:           可选 [{role, text}]，跟进态注入 WorkingSet.history
#   initial_intents:   可选；给出（连同 expect_det_intents）则该用例进「离线确定性子集」：
#                      模拟 LLM 已规划出的 intents，直调 RouteHintEngine 断言（顺序敏感，
#                      同 route_hints_cases 口径）。live 与 det 期望可不同（det 只看 hints 层）。
#   expect_det_intents: 确定性子集的期望最终 intent 列表
#   source:            溯源/备注
#
# 注意：expect_det_intents 描述的是**目标态**（含 P0-4 将新增的 info.search/info.news hints）。
# 在 hints 落地前离线子集会有预期内 FAIL（钉的就是这个缺口）；落地后转 PASS 属预期 improvement。

