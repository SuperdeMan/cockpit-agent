syntax = "proto3";

package cockpit.agent.v1;

import "google/protobuf/struct.proto";
import "cockpit/common/v1/common.proto";

// 所有 Agent（core/ecosystem，端/云）必须实现的统一契约。即插即用的前提。
service Agent {
  rpc Describe      (DescribeRequest) returns (AgentManifest);          // 上报能力清单
  rpc Execute       (ExecuteRequest)  returns (ExecuteResponse);        // 同步执行
  rpc ExecuteStream (ExecuteRequest)  returns (stream ExecuteEvent);    // 流式执行（长任务/流式话术）
  rpc Health        (HealthRequest)   returns (HealthResponse);
}

message DescribeRequest {}

// 能力声明（运行时版本，对应 manifest.yaml）
message AgentManifest {
  string agent_id = 1;
  string version = 2;
  string display_name = 3;
  string category = 4;              // core | ecosystem
  string trust_level = 5;           // system | first_party | third_party
  string deployment = 6;            // edge | cloud
  uint32 latency_budget_ms = 7;
  string fallback = 8;              // 失败/拒绝降级到的 agent_id
  repeated Capability capabilities = 9;
  repeated string requires_permissions = 10;
  repeated string edge_intents = 11; // 端侧本地意图白名单（供 Fast Intent）
  string kind = 12;                 // agent（默认）| tool | edge_fast：调度语义/治理，区别于 deployment（传输）
  repeated string context_scopes = 13; // Agent 声明需要的敏感上下文片段（如 location | vehicle_state）；编排按此最小化下发
  repeated RouteHint route_hints = 14; // 确定性路由提示：弱 LLM 漏/误路由时编排核心通用 RouteHintEngine 据此兜底（R2.1，领域路由知识由 Agent 声明而非编排核心硬编码）
}

message Capability {
  string intent = 1;
  string description = 2;
  repeated string slots = 3;
  repeated string examples = 4;     // 供语义路由的示例话术
  bool require_confirm = 5;
  bool heavy = 6;                   // 重域能力：命中即开思考+过程区（progress.HEAVY_INTENTS 机制化，R2.1）
}

// 确定性路由提示（R2.1）：Agent 声明「命中 pattern 即路由到本 Agent 的 intent」，
// 编排核心 RouteHintEngine 通用消费——把领域路由正则/兜底从 planning.py 搬回 Agent，
// 恢复「新增 Agent 不改编排核心」铁律。语义等价于原 planning._ensure_* 系列。
message RouteHint {
  string pattern = 1;               // 触发正则（Python re 语法）
  string intent = 2;                // 命中后路由到的本 Agent intent
  string policy = 3;                // replace=取代误规划整条计划 | append=并列补步（默认 replace）
  int32 priority = 4;               // 冲突时高优先先判（降序）
  string guard = 5;                 // 可选反例守卫正则：命中 guard 则本 hint 不生效
  map<string, string> slots = 6;    // 槽位模板：值为 $text=原话 / $1.. =捕获组 / 其余字面量原样
}

message ExecuteRequest {
  string request_id = 1;
  string session_id = 2;
  cockpit.common.v1.Intent intent = 3;
  cockpit.common.v1.ContextRef context = 4;
  repeated cockpit.common.v1.ModalityRef modalities = 5;
  map<string, string> meta = 6;     // trace_id, locale, vehicle_id ...
}

message ExecuteResponse {
  enum Status {
    OK = 0;
    NEED_CONFIRM = 1;               // 需用户二次确认
    NEED_SLOT = 2;                  // 缺槽位，需追问
    FAILED = 3;
    REJECTED = 4;                   // 权限/安全拒绝
  }
  Status status = 1;
  string speech = 2;                // 给 TTS 的播报话术
  google.protobuf.Struct ui_card = 3; // 给 HMI 的结构化卡片（可选）
  repeated cockpit.common.v1.AgentAction actions = 4;
  string follow_up = 5;             // 追问/澄清提示
  cockpit.common.v1.ErrorInfo error = 6;
  google.protobuf.Struct data = 7;  // 结构化结果（供编排 slot_refs 取值，不面向 HMI）
  repeated string missing_slots = 8; // NEED_SLOT 时声明缺失的槽位名（F12）
}

// 流式：边想边说边做
message ExecuteEvent {
  oneof event {
    string speech_delta = 1;        // 流式话术增量
    cockpit.common.v1.AgentAction action = 2;
    ExecuteResponse final = 3;      // 终态
  }
}

message HealthRequest {}
message HealthResponse {
  enum Serving { UNKNOWN = 0; SERVING = 1; NOT_SERVING = 2; }
  Serving status = 1;
}
