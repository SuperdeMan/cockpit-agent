  - text: 气象台发布了什么预警
    forbid_object: weather
    source: "R4.1 P3 B1 气象反例（预警=info.alerts 云端）"
    tags: [weather, hijack, b1]

  # R4.1 P3 B2：设置页开合反例——读内容/manual 类不得被判成 page（须上云）
  - text: 打开设置里的隐私协议给我读一下
    forbid_object: page
    source: "R4.1 P3 B2 反例（读内容请求=云端，非开设置页）"
