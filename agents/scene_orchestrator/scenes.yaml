# 预置场景库（builtin，随镜像发版）。用户场景存 PG（scene_item 表），同名遮蔽预置（D4）。
#
# **词表纪律（D3）**：这里的 command/params 必须命中 VAL 知识库
# （orchestrator/edge/knowledge/{commands,entities}.yaml）——`tests/test_agent.py::
# test_builtin_scenes_are_catalog_valid` 逐条钉死。词表外的值会被端侧 edge_call 静默丢弃
# （2026-07-14 前 mode: auto/quiet/external_circulation 与 color: warm_orange 就是这么
# 悄悄失效的：说了「外循环」其实没开），这正是本次重构要根治的漂移。
scenes:
  go_home:
    name: "回家模式"
    description: "自动导航回家 + 舒适车内环境"
    aliases: ["回家", "回去", "回家模式"]
    actions:
      - type: "vehicle.control"
        command: "hvac.set"
        params: { temperature: "24" }
        require_confirm: false
      - type: "vehicle.control"
        command: "ambient_light.set"
        params: { color: "warm_white", brightness: "60" }
        require_confirm: false
      - type: "navigate"
        payload: { destination: "家" }
        require_confirm: false

  camping:
    name: "露营模式"
    description: "座椅放平 + 空调外循环 + 暖色氛围灯"
    aliases: ["露营", "露营模式", "户外"]
    actions:
      - type: "vehicle.control"
        command: "seat.recline"
        params: { position: "front_left", angle: "180" }
        require_confirm: true
      - type: "vehicle.control"
        command: "hvac.set"
        params: { temperature: "22", mode: "外循环" }
        require_confirm: false
      - type: "vehicle.control"
        command: "ambient_light.set"
        params: { color: "orange", brightness: "30" }
        require_confirm: false

  nap:
    name: "午休模式"
    description: "座椅放平 + 静音 + 氛围灯调暗"
    aliases: ["午休", "午睡", "休息", "午休模式"]
    actions:
      - type: "vehicle.control"
        command: "seat.recline"
        params: { position: "front_left", angle: "160" }
        require_confirm: true
      - type: "vehicle.control"
        command: "volume.set"
        params: { level: "0" }
        require_confirm: false
      - type: "vehicle.control"
        command: "ambient_light.set"
        params: { color: "orange", brightness: "10" }
        require_confirm: false
      - type: "vehicle.control"
        command: "hvac.set"
        params: { temperature: "24" }
        require_confirm: false

  romance:
    name: "浪漫模式"
    description: "氛围灯粉色 + 舒缓音乐 + 香氛 + 适宜温度"
    aliases: ["浪漫", "约会", "浪漫模式"]
    actions:
      - type: "vehicle.control"
        command: "ambient_light.set"
        params: { color: "pink", brightness: "40" }
        require_confirm: false
      - type: "vehicle.control"
        command: "hvac.set"
        params: { temperature: "23" }
        require_confirm: false
      - type: "vehicle.control"
        command: "fragrance.on"
        params: {}
        require_confirm: false
      # P1.4：媒体动作（端侧 _dispatch_cloud_actions 已放开 media.control 回流）。
      # 起播只能用 media.play——edge_call 把 play 归一成 start，music/radio 都没声明 start。
      - type: "media.control"
        command: "media.play"
        params: {}
        require_confirm: false
