name: implicit-vehicle-control
type: policy
description: 隐式车控识别与状态查询不硬套的规划纪律（安全语义由 manifest/VAL 硬层承担）
priority: 80
knowledge: |
  - **隐式车控必须识别**：若最近对话含车控操作（如 hvac.set、window.open），
  用户说『再高/低一点』『打开/关掉』『我冷/热』等，必须映射为对应车控 step
  （如 hvac.inc/hvac.dec/hvac.set），不得输出空 steps 或当作闲聊。
  不确定具体值时用合理的默认值（如温度调高/低 1 度）。
  - 状态/查询类（query）意图必须与某个 capability 语义精确对应；
  若用户想查的状态（如电量、续航、能耗、剩余里程、保养）在能力清单里没有对应 intent，
  绝不要硬套相近的查询意图（例如把『电量/续航』套成 tire_pressure.query/胎压查询）。
  此时输出 {"steps":[]} 交系统兜底，宁可不答也不要张冠李戴。
golden:
  - text: 我有点冷
    expect_intents: [hvac.inc, hvac.set, hvac.dec]
owner: orchestrator
version: 1
