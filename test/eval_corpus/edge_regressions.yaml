    forbid_object: page
    source: "R4.1 P3 B2 反例（怎么用=manual.query 云端）"
    tags: [page, hijack, b2]

  # R4.1b P0 反例：语义相邻对象不得被新对象误吸
  - text: 查一下今天的空气质量
    forbid_object: air_purifier
    source: "R4.1b P0 反例（空气质量=air_quality 查询，非空气净化控制）"
    tags: [air_purifier, hijack, r4.1b]
  - text: 导航去公司
    forbid_object: navi_broadcast
    source: "R4.1b P0 反例（导航去X=navigation 路线，非导航播报开关）"
    tags: [navi_broadcast, hijack, r4.1b]
