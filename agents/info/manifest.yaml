agent_id: info
version: 0.2.0
display_name: 信息助手
category: core
trust_level: first_party
deployment: cloud
# 信息类要联网搜索(Exa 18s)+LLM 接地合成(~10-20s)；深度调研动态开思考后合成更慢，给足 Execute 超时。
# 这是超时上限（ceiling），天气/股票等快查询仍秒回，不增加其延迟。
latency_budget_ms: 50000
fallback: chitchat

capabilities:
  - intent: info.weather
    description: 查询指定城市或当前位置的实时天气
    slots: [city, date]
    examples: ["今天天气怎么样", "北京天气如何", "上海现在多少度"]

  - intent: info.forecast
    description: 查询指定城市未来几天天气预报
    slots: [city, days]
    examples: ["明天天气怎么样", "北京未来三天天气", "后天会下雨吗", "这周天气预报"]

  - intent: info.alerts
    description: 查询指定城市当前生效的天气预警
    slots: [city]
    examples: ["有没有天气预警", "北京有暴雨预警吗", "今天有极端天气吗"]

  - intent: info.indices
    description: 查询城市生活指数（运动/洗车/紫外线等）
    slots: [city]
    examples: ["今天适合运动吗", "明天可以洗车吗", "紫外线强不强", "生活指数"]

  - intent: info.air_quality
    description: 查询城市实时空气质量（AQI/PM2.5/PM10等）
    slots: [city]
    examples: ["空气质量怎么样", "PM2.5多少", "今天空气好吗", "空气质量"]

  - intent: info.search
    description: 联网搜索信息
    slots: [query, limit]
    heavy: true    # 联网搜索+接地合成 → 开思考+过程区
    examples: ["搜一下", "帮我查一下", "搜索", "帮我搜"]

  - intent: info.sports
    description: 查询赛事实时比分与赛程（足球，结构化真实数据）
    slots: [query, league]
    examples: ["今天世界杯赛程", "世界杯比分", "英超赛果", "欧冠今晚有哪些比赛", "西甲对阵"]

  - intent: info.news
    description: 获取新闻头条和资讯摘要
    slots: [topic, limit]
    heavy: true    # 新闻汇总+接地合成 → 开思考+过程区
    examples: ["今天有什么新闻", "科技新闻", "最新头条", "看看新闻"]

  - intent: info.stock
    description: 查询股票或指数实时行情
    slots: [symbol]
    examples: ["茅台股价", "上证指数多少", "今天大盘怎么样", "查一下苹果股票"]

# 确定性路由（R2.1）：弱 LLM 会把「巴西那场帮我看看详情」这类**赛事追问**误路由到 nearby.detail
# （"看…详情"歧义）。这里用比 nearby 略高的优先级(58>55)把「那场/第N场 + 赛事细节词」召回 info.sports，
# 由 sports handler 的 _league_from_history 从上轮回填联赛、_pick_fixture 定位到该场比赛详情。
# guard 排除「电影/演唱会/景点」等同样用「场」的非赛事上下文（歧义时退化通用搜索，不误进周边）。
route_hints:
  - pattern: '(那|这|上一?|哪)\s*一?\s*场[^，。！？]{0,12}(详情|详细|怎么样|怎样|战报|进球|谁进|射手|得分|集锦|经过|赛况|比分|结果|讲讲|说说)|第\s*[一二两三四五六七八九十\d]+\s*场[^，。！？]{0,10}(详情|怎么样|进球|谁进|射手|战报|赛况|比分)'
    guard: '餐厅|饭店|饭馆|美食|火锅|川菜|日料|咖啡|奶茶|甜品|电影|影院|演唱会|音乐会|话剧|舞台剧|展览|展会|酒店|民宿|景点|景区'
    intent: info.sports
    policy: replace
    priority: 58
    slots: {query: "$text"}

requires_permissions:
  - network.external
  - location.read
edge_intents: []
context_scopes: [location]   # 天气/本地搜索按当前位置反查城市
