agent_id: trip-planner
version: 0.1.0
display_name: 行程规划
category: ecosystem
trust_level: first_party
deployment: cloud
latency_budget_ms: 40000   # 多日行程是 LLM 重生成（慢系统）；复杂任务动态开思考后更慢，给足 Execute 超时
fallback: chitchat

capabilities:
  - intent: trip.plan
    description: 规划多日自驾行程（目的地、天数、偏好），输出每日要点。凡"去X玩N天/N日游"
      并带出行偏好(带老人/带娃/轻松/不要太累/悠闲)，即便同句还问天气/充电，行程规划也应单独成步。
    slots: [destination, days, preferences]
    heavy: true    # 多日行程 LLM 重生成 → 开思考+过程区
    examples: ["规划周末去杭州两日游", "帮我安排去三亚的行程", "周末带娃去近郊玩",
               "周末去杭州两天带老人不要太累", "去成都玩三天轻松点",
               "周末去杭州两天带老人，顺便看看天气和是否需要中途充电"]
  - intent: trip.modify
    description: 修改已有行程（结构化局部编辑：换/加/删某个停靠点，只动受影响的天）
    slots: [modification]
    heavy: true    # 局部重规划仍走 LLM → 开思考+过程区
    examples: ["第二天换成宋城", "不去千岛湖了", "加一个西湖", "删掉第三天的奥林匹克公园"]
  - intent: trip.navigate
    description: 导航到当前行程里的某个停靠点（『下一站』『导航去第二天的西湖』『第三天第一个』）。
      仅在已有规划好的行程时由确定性路由命中，普通导航仍走 navigation。
    slots: [day, stop, target]
    examples: ["下一站", "导航去第二天的西湖", "第三天第一个", "去行程里的故宫"]
  - intent: trip.status
    description: 查询当前行程在途进度（在第几站/下一站/还剩几站/全程需补电几次）。只读，不改行程。
    slots: []
    examples: ["行程到哪了", "还剩几站", "我在第几站", "还要充几次电"]
  - intent: trip.reschedule
    description: 在途精简剩余行程（时间不够/太累/想提前回）——确定性砍掉靠后的停靠点或最后一天，需二次确认。
    slots: [hint]
    examples: ["时间不够了", "太累了精简一下", "想提前回家", "今天少玩一个"]

# 确定性路由（R2.1）：弱 LLM 常漏/误路由行程内意图（借历史目的地误判成天气/充电）。
# 逐字迁移自原 planning 的 _TRIP_NAV_RE/_TRIP_NAV_BLOCK_RE/_TRIP_RESCHEDULE_RE/
# _TRIP_STATUS_RE/_TRIP_MODIFY_RE（_ensure_trip_navigate/reschedule/status/modify）。
# 均 replace（互斥、取代误规划）；priority 复刻原判定顺序 navigate>reschedule>status>modify。
# trip.plan（append，需目的地抽取）见 P2c。
route_hints:
  - pattern: '下一站|下个景点|继续导航|(?:导航|带我去|去|到)[^，。！？]{0,6}第\s*[一二两三四五六七八九十\d]+\s*天|第\s*[一二两三四五六七八九十\d]+\s*天[^，。！？]{0,4}第\s*[一二两三四五六七八九十\d]+\s*个'
    guard: '换|改|调整|删|加|不去|不要|重新|规划'
    intent: trip.navigate
    policy: replace
    priority: 90
    slots: {}
  - pattern: '时间不够|来不及|赶不及|太累了|好累|累坏|累死|提前回|早点回|早些回|提前结束|精简.{0,2}行程|简化行程|行程太满|玩不完|少玩|少去'
    intent: trip.reschedule
    policy: replace
    priority: 80
    slots: {hint: "$text"}
  - pattern: '行程(到哪|进度|还剩|还有|怎么样)|还剩几[站个]|我在第几[站天]|到第几站|今晚住哪|行程.{0,3}充几次'
    intent: trip.status
    policy: replace
    priority: 70
    slots: {}
  - pattern: '第\s*[一二两三四五六七八九十\d]+\s*天[^，。！？]*?(换|改|调整|替换|更换|删|加|重新|别去|不去)|(行程|景点|目的地|这天|那天)[^，。！？]*?(换|改|调整|替换|更换|重新规划)|(换|改|调整|更换)[^，。！？]{0,4}(行程|景点|目的地|第\s*[一二两三四五六七八九十\d]+\s*天)|(删掉|删除|去掉|加一个|加个|增加|不去)[^，。！？]{0,8}第\s*[一二两三四五六七八九十\d]+\s*天'
    intent: trip.modify
    policy: replace
    priority: 60
    slots: {modification: "$text"}
  # trip.plan（append，新出行兜底）：弱 LLM 常把「去X玩N天/带老人」只当天气/充电的目的地上下文而漏掉行程。
  # 触发=DEST(去/到/赴/游+地名) 且 SIGNAL(天数/偏好/日游/行程/自驾游/度假)，或「地名+N日游」；
  # guard 反例=通勤/固定点(去公司/到机场…)。此触发等价原编排核心 _extract_trip 的注入门控（逐字验证
  # 12 例决策一致）；真正的 dest/days/prefs 抽取由 Agent 侧 extract_trip 从 raw_text 完成。
  - pattern: '(?=.*(?:去|到|赴|游)[一-鿿]{2,6})(?=.*(?:[一二两三四五六七八九十0-9]+\s*[天日]|带老人|带娃|带孩子|带小孩|不要太累|不累|轻松|悠闲|慢一点|慢点|休闲|日游|行程|自驾游|度假))|[一-鿿]{2,6}[一二两三四五六七八九十0-9]+\s*[天日]游'
    guard: '(?:去|到|赴|游)\s*(?:公司|家|单位|学校|上班|这里|那里|机场|车站)'
    intent: trip.plan
    policy: append
    priority: 50
    slots: {}

requires_permissions:
  - location.read
  - network.external
edge_intents: []
context_scopes: [location, vehicle_state]   # 透传给子 agent（navigation/charging）
