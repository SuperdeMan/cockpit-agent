# PoC 全栈一键起。生产部署见 deploy/helm/。
# 服务端口规划见各服务 README；gRPC 服务间通过容器 DNS 互通。
name: car-agent

# This file is included by ../compose.yaml.  Do not invoke it as the first
# Compose file: that would make deploy/ the project directory and bypass root .env.

x-python-env: &python-env
  REGISTRY_ADDR: registry:50051
  LLM_GATEWAY_ADDR: llm-gateway:50052
  MEMORY_ADDR: memory:50053
  CLOUD_PLANNER_ADDR: cloud-planner:50054
  NATS_URL: nats://nats:4222
  REDIS_URL: redis://redis:6379/0
  LOG_LEVEL: ${LOG_LEVEL:-info}
  # 开放域模型分层（task 4）：Agent（如 chitchat）据此选快/重模型
  LLM_MODEL_PRIMARY: ${LLM_MODEL_PRIMARY:-mimo-v2.5-pro}
  LLM_MODEL_FAST: ${LLM_MODEL_FAST:-mimo-v2.5}
  PLANNER_LOOP_MAX_ITERS: ${PLANNER_LOOP_MAX_ITERS:-2}
  PLANNER_LOOP_BUDGET_MS: ${PLANNER_LOOP_BUDGET_MS:-5000}

services:
  # ── 基础设施 ──
  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]

  nats:
    image: nats:2-alpine
    command: ["-js", "-m", "8222"]
    ports: ["4222:4222"]
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8222/healthz"]
      interval: 2s
      timeout: 1s
      retries: 10

  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: cockpit
      POSTGRES_PASSWORD: cockpit
      POSTGRES_DB: cockpit
    ports: ["5432:5432"]

  # ws8 P1: HTTP 代理（网络白名单）——third-party Agent 出站 HTTP 经此代理
  http-proxy:
    image: envoyproxy/envoy:v1.29
    volumes:
      - ./envoy-proxy.yaml:/etc/envoy.yaml
    ports: ["8082:8080"]

  # ── 云侧核心 ──
  registry:
    build: { context: .., dockerfile: registry/Dockerfile }
    environment:
      NATS_URL: nats://nats:4222
      LOG_LEVEL: ${LOG_LEVEL:-info}
      POSTGRES_DSN: postgresql://cockpit:cockpit@postgres:5432/cockpit
    ports: ["50051:50051"]
    depends_on:
      nats:
        condition: service_healthy
      postgres:
        condition: service_started
    # P1 多实例：replicas: 2（PostgreSQL UPSERT 天然幂等，多实例写同一行安全）
    deploy:
      replicas: ${REGISTRY_REPLICAS:-1}

  llm-gateway:
    build: { context: .., dockerfile: llm-gateway/Dockerfile }
    environment:
      <<: *python-env
      LLM_PROVIDER: ${LLM_PROVIDER:-xiaomimimo}
      LLM_API_KEY: ${LLM_API_KEY:-}
      # OpenAI 兼容服务商可切换端点/鉴权/思考开关，换服务商只改 .env（详见 .env.example）
      LLM_BASE_URL: ${LLM_BASE_URL:-}
      LLM_AUTH_STYLE: ${LLM_AUTH_STYLE:-api-key}
      LLM_DISABLE_THINKING: ${LLM_DISABLE_THINKING:-true}
      LLM_MODEL_PRIMARY: ${LLM_MODEL_PRIMARY:-mimo-v2.5-pro}
      LLM_MODEL_FALLBACK: ${LLM_MODEL_FALLBACK:-mimo-v2.5}
      # Embedding（记忆语义检索）：默认阿里云百炼 text-embedding-v4（1024 维）。
      # 仅需在根 .env 填 LLM_EMBED_API_KEY=<百炼 key>；其余有默认值。
      LLM_EMBED_URL: ${LLM_EMBED_URL:-https://dashscope.aliyuncs.com/compatible-mode/v1/embeddings}
      LLM_EMBED_MODEL: ${LLM_EMBED_MODEL:-text-embedding-v4}
      LLM_EMBED_API_KEY: ${LLM_EMBED_API_KEY:-}
      LLM_EMBED_AUTH_STYLE: ${LLM_EMBED_AUTH_STYLE:-bearer}
      LLM_EMBED_DIMENSIONS: ${LLM_EMBED_DIMENSIONS:-1024}
      AUDIO_HTTP_PORT: "50059"
      TTS_VOICE_ID: ${TTS_VOICE_ID:-冰糖}
    ports: ["50052:50052", "50059:50059"]
    depends_on: [redis]

  memory:
    build: { context: .., dockerfile: memory/Dockerfile }
    environment:
      <<: *python-env
      POSTGRES_DSN: postgresql://cockpit:cockpit@postgres:5432/cockpit
      EMBED_DIM: ${EMBED_DIM:-1024}   # 须与 LLM_EMBED_DIMENSIONS 一致（百炼 v4 默认 1024）
    ports: ["50053:50053"]
    depends_on: [redis, postgres]

  cloud-planner:
    build: { context: .., dockerfile: orchestrator/cloud/Dockerfile }
    environment: *python-env
    ports: ["50054:50054"]
    depends_on: [registry, llm-gateway, memory]

  payment-gateway:
    build: { context: .., dockerfile: payment-gateway/Dockerfile }
    environment:
      <<: *python-env
      PAYMENT_PORT: "50071"
    ports: ["50071:50071"]
    depends_on: [redis]

  # ── Agents ──
  navigation-agent:
    build: { context: .., dockerfile: agents/navigation/Dockerfile }
    environment:
      <<: *python-env
      AGENT_PORT: "50061"
      # 真实 POI provider（高德）；不配 key 走 mock。key 只注入本服务（最小化）。
      POI_VENDOR: ${POI_VENDOR:-mock}
      AMAP_KEY: ${AMAP_KEY:-}
    depends_on: [registry, llm-gateway]

  chitchat-agent:
    build: { context: .., dockerfile: agents/chitchat/Dockerfile }
    environment:
      <<: *python-env
      AGENT_PORT: "50062"
    depends_on: [registry, llm-gateway]

  food-ordering-agent:
    build: { context: .., dockerfile: agents/food_ordering/Dockerfile }
    environment:
      <<: *python-env
      AGENT_PORT: "50063"
      HTTP_PROXY: http://http-proxy:8080
      HTTPS_PROXY: http://http-proxy:8080
    depends_on: [registry, llm-gateway, memory, http-proxy]
    # ws8 P1: third-party Agent 沙箱（资源限制 + 只读文件系统 + 代理出站）
    read_only: true
    security_opt: [no-new-privileges]
    mem_limit: 256m
    cpus: 0.5

  parking-payment-agent:
    build: { context: .., dockerfile: agents/parking_payment/Dockerfile }
    environment:
      <<: *python-env
      AGENT_PORT: "50064"
      HTTP_PROXY: http://http-proxy:8080
      HTTPS_PROXY: http://http-proxy:8080
    depends_on: [registry, llm-gateway, memory, http-proxy]
    # ws8 P1: third-party Agent 沙箱
    read_only: true
    security_opt: [no-new-privileges]
    mem_limit: 256m
    cpus: 0.5

  manual-rag-agent:
    build: { context: .., dockerfile: agents/manual_rag/Dockerfile }
    environment:
      <<: *python-env
      AGENT_PORT: "50065"
    depends_on: [registry, llm-gateway]

  trip-planner-agent:
    build: { context: .., dockerfile: agents/trip_planner/Dockerfile }
    environment:
      <<: *python-env
      AGENT_PORT: "50066"
    depends_on: [registry, llm-gateway]

  info-agent:
    build: { context: .., dockerfile: agents/info/Dockerfile }
    environment:
      <<: *python-env
      AGENT_PORT: "50067"
      # 真实天气 provider（和风）；不配走 mock。鉴权 JWT 优先，否则 API Key。凭证只注入本服务。
      WEATHER_VENDOR: ${WEATHER_VENDOR:-mock}
      QWEATHER_HOST: ${QWEATHER_HOST:-devapi.qweather.com}
      QWEATHER_PROJECT_ID: ${QWEATHER_PROJECT_ID:-}
      QWEATHER_KEY_ID: ${QWEATHER_KEY_ID:-}
      QWEATHER_PRIVATE_KEY: ${QWEATHER_PRIVATE_KEY:-}
      QWEATHER_PRIVATE_KEY_PATH: ${QWEATHER_PRIVATE_KEY_PATH:-}
      QWEATHER_KEY: ${QWEATHER_KEY:-}
      # 仅用于把已授权定位坐标反查为天气卡可读地点；未配置时展示“当前位置”。
      AMAP_KEY: ${AMAP_KEY:-}
      # 联网搜索（优先 Exa 正文级检索，降级 AnySearch→Bing）；不配走 mock
      EXA_API_KEY: ${EXA_API_KEY:-}
      EXA_BASE_URL: ${EXA_BASE_URL:-https://api.exa.ai}
      ANYSEARCH_API_KEY: ${ANYSEARCH_API_KEY:-}
      ANYSEARCH_BASE_URL: ${ANYSEARCH_BASE_URL:-https://api.anysearch.com}
      BING_SEARCH_KEY: ${BING_SEARCH_KEY:-}
      # 新闻（SerpApi: Google+Baidu News，AnySearch 兜底）；不配走 mock
      SERPAPI_API_KEY: ${SERPAPI_API_KEY:-}
      NEWS_API_KEY: ${NEWS_API_KEY:-}
      # 赛事（api-football：实时比分/赛程，league=1 世界杯）；不配走 mock
      API_FOOTBALL_KEY: ${API_FOOTBALL_KEY:-}
      API_FOOTBALL_HOST: ${API_FOOTBALL_HOST:-v3.football.api-sports.io}
      # 股票行情（Tushare 免费 API）；不配走 mock
      TUSHARE_TOKEN: ${TUSHARE_TOKEN:-}
      STOCK_API_KEY: ${STOCK_API_KEY:-}
    # JWT 用文件私钥时取消下面注释，把宿主机 PEM 挂进容器（路径与 QWEATHER_PRIVATE_KEY_PATH 一致）：
    # volumes:
    #   - ${QWEATHER_PRIVATE_KEY_PATH}:${QWEATHER_PRIVATE_KEY_PATH}:ro
    depends_on: [registry, llm-gateway]

  charging-planner-agent:
    build: { context: .., dockerfile: agents/charging_planner/Dockerfile }
    environment:
      <<: *python-env
      AGENT_PORT: "50068"
      # 高德：充电站 POI 搜索 + 路线距离/时长（真实充能规划）；不配走 mock
      AMAP_KEY: ${AMAP_KEY:-}
    depends_on: [registry, llm-gateway, memory]

  scene-orchestrator-agent:
    build: { context: .., dockerfile: agents/scene_orchestrator/Dockerfile }
    environment:
      <<: *python-env
      AGENT_PORT: "50069"
    depends_on: [registry, llm-gateway]

  road-safety-agent:
    build: { context: .., dockerfile: agents/road_safety/Dockerfile }
    environment:
      <<: *python-env
      AGENT_PORT: "50072"
    depends_on: [registry, llm-gateway]

  observability-collector:
    build: { context: .., dockerfile: observability/collector/Dockerfile }
    environment:
      NATS_URL: nats://nats:4222
      OBS_COLLECTOR_PORT: "8092"
      DEBUG_VEHICLE_CONTROL: ${DEBUG_VEHICLE_CONTROL:-true}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    ports: ["8092:8092"]
    depends_on:
      nats:
        condition: service_healthy

  # ── 接入层 ──
  cloud-gateway:
    build: { context: .., dockerfile: gateway/cloud/Dockerfile }
    environment:
      CLOUD_PLANNER_ADDR: cloud-planner:50054
      LOG_LEVEL: ${LOG_LEVEL:-info}
    ports: ["8080:8080"]
    depends_on: [cloud-planner]

  edge-gateway:
    build: { context: .., dockerfile: gateway/edge/Dockerfile }
    environment:
      EDGE_GATEWAY_PORT: "8090"
      EDGE_ORCHESTRATOR_ADDR: edge-orchestrator:50070
      NATS_URL: nats://nats:4222   # 主动建议（agent.proactive）→ HMI WS 投递
      LOG_LEVEL: ${LOG_LEVEL:-info}
    ports: ["8090:8090"]
    depends_on: [edge-orchestrator, nats]

  edge-orchestrator:
    # 端侧编排器：内含 Fast Intent + 端侧车控/媒体 Agent + 模拟 VAL（PoC 简化为单进程）
    build: { context: .., dockerfile: orchestrator/edge/Dockerfile }
    environment:
      CLOUD_GATEWAY_ADDR: cloud-gateway:8080
      NATS_URL: nats://nats:4222
      FAST_INTENT_THRESHOLD_HIGH: ${FAST_INTENT_THRESHOLD_HIGH:-0.85}
      FAST_INTENT_THRESHOLD_LOW: ${FAST_INTENT_THRESHOLD_LOW:-0.5}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    ports: ["50070:50070"]
    depends_on:
      cloud-gateway:
        condition: service_started
      nats:
        condition: service_healthy

  # ── 前端 ──
  hmi:
    build: { context: ../hmi, dockerfile: Dockerfile }
    environment:
      VITE_EDGE_GATEWAY_URL: http://localhost:8090
      VITE_AUDIO_API_URL: http://localhost:50059
    ports: ["5173:5173"]
    depends_on: [edge-gateway]

  dashboard:
    build: { context: .., dockerfile: dashboard/Dockerfile }
    environment:
      VITE_COLLECTOR_URL: http://localhost:8092
      VITE_EDGE_GATEWAY_URL: http://localhost:8090
    ports: ["5174:5174"]
    depends_on: [observability-collector, edge-gateway]
