<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- 小舟 AuroraOrb favicon：真机截帧对照重制（多层叠加的「冻结一帧」，非亮色实心球）——
       深蓝紫磨砂玻璃底 + 内部极光雾斑（紫为主/底部粉/左下青，对应 AuroraOrb.tsx 双层
       conic 漩涡的低透明度混色）+ 左上大团柔和白紫高光 + 紫色环境辉光 + 细白 rim -->
  <defs>
    <radialGradient id="halo" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#7A6BFF" stop-opacity=".5"/>
      <stop offset="55%" stop-color="#6B5BFF" stop-opacity=".22"/>
      <stop offset="100%" stop-color="#6B5BFF" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="base" cx="38%" cy="30%" r="88%">
      <stop offset="0%" stop-color="#DDD6FF"/>
      <stop offset="18%" stop-color="#9C92EC"/>
      <stop offset="42%" stop-color="#6561CC"/>
      <stop offset="70%" stop-color="#45449C"/>
      <stop offset="100%" stop-color="#2B2D5E"/>
    </radialGradient>
    <radialGradient id="spec" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity=".92"/>
      <stop offset="60%" stop-color="#E8E2FF" stop-opacity=".38"/>
      <stop offset="100%" stop-color="#E8E2FF" stop-opacity="0"/>
    </radialGradient>
    <clipPath id="ball"><circle cx="32" cy="32" r="22"/></clipPath>
    <filter id="soft" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="4"/>
    </filter>
  </defs>
  <circle cx="32" cy="32" r="31" fill="url(#halo)"/>
  <circle cx="32" cy="32" r="22" fill="url(#base)"/>
  <g clip-path="url(#ball)">
    <ellipse cx="46" cy="31" rx="11" ry="10" fill="#8B5BFF" opacity=".9" filter="url(#soft)"/>
    <ellipse cx="34" cy="48" rx="11" ry="7.5" fill="#FF5BD0" opacity=".8" filter="url(#soft)"/>
    <ellipse cx="26" cy="45" rx="9" ry="6.5" fill="#3ED3EE" opacity=".8" filter="url(#soft)"/>
    <ellipse cx="16" cy="37" rx="6" ry="5" fill="#5BE9FF" opacity=".4" filter="url(#soft)"/>
    <ellipse cx="41" cy="50" rx="7" ry="5" fill="#FF8BE0" opacity=".5" filter="url(#soft)"/>
    <ellipse cx="23.5" cy="19.5" rx="11" ry="8.5" fill="url(#spec)" filter="url(#soft)"/>
  </g>
  <circle cx="32" cy="32" r="22" fill="none" stroke="#FFFFFF" stroke-opacity=".3" stroke-width=".8"/>
</svg>
