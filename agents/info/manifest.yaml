agent_id: info
version: 0.2.0
display_name: 信息助手
category: core
trust_level: first_party
deployment: cloud
# 信息类要联网搜索(Exa 18s)+LLM 接地合成(~10-20s)；深度调研动态开思考后合成更慢，给足 Execute 超时。
# 这是超时上限（ceiling），天气/股票等快查询仍秒回，不增加其延迟。
latency_budget_ms: 50000
fallback: chitchat

capabilities:
  - intent: info.weather
    description: 查询指定城市或当前位置的实时天气
    slots: [city, date]
    examples: ["今天天气怎么样", "北京天气如何", "上海现在多少度"]

  - intent: info.forecast
    description: 查询指定城市未来几天天气预报
    slots: [city, days]
    examples: ["明天天气怎么样", "北京未来三天天气", "后天会下雨吗", "这周天气预报"]

  - intent: info.alerts
    description: 查询指定城市当前生效的天气预警
    slots: [city]
    examples: ["有没有天气预警", "北京有暴雨预警吗", "今天有极端天气吗"]

  - intent: info.indices
    description: 查询城市生活指数（运动/洗车/紫外线等）
    slots: [city]
    examples: ["今天适合运动吗", "明天可以洗车吗", "紫外线强不强", "生活指数"]

  - intent: info.air_quality
    description: 查询城市实时空气质量（AQI/PM2.5/PM10等）
    slots: [city]
    examples: ["空气质量怎么样", "PM2.5多少", "今天空气好吗", "空气质量"]

  - intent: info.search
    description: 联网搜索实时、最新或你不确定的信息，回答**一个具体问题**：近期事件、价格、
      榜单、发布、事实核查——凡答案会随时间变化的问题都用本能力，不要闲聊直答。
      只想浏览一批资讯用新闻能力；要系统性了解一个主题用深度调研能力
    slots: [query, limit]
    heavy: true    # 联网搜索+接地合成 → 开思考+过程区
    examples: ["搜一下固态电池最新进展", "帮我查一下iPhone现在的价格",
               "昨晚发布会都发布了什么", "现在油价多少", "帮我搜"]

  - intent: info.sports
    description: 查询赛事实时比分与赛程（足球，结构化真实数据）
    slots: [query, league]
    examples: ["今天世界杯赛程", "世界杯比分", "英超赛果", "欧冠今晚有哪些比赛", "西甲对阵"]

  - intent: info.news
    description: 浏览新闻头条/资讯列表——想**看一批**新闻资讯时用（含「X最新消息/X最新动态」
      这类想了解某主题近况的说法）；对某个具体问题要答案用搜索能力；要系统了解一个主题用
      深度调研能力
    slots: [topic, limit]
    heavy: true    # 新闻汇总+接地合成 → 开思考+过程区
    examples: ["今天有什么新闻", "科技新闻", "最新头条", "看看新闻",
               "来点财经新闻", "英伟达最新消息"]

  - intent: info.stock
    description: 查询股票或大盘指数实时行情（仅证券——黄金/外汇/加密货币等价格走联网搜索）
    slots: [symbol]
    examples: ["茅台股价", "上证指数多少", "今天大盘怎么样", "查一下苹果股票"]

# 确定性路由（R2.1）：弱 LLM 会把「巴西那场帮我看看详情」这类**赛事追问**误路由到 nearby.detail
# （"看…详情"歧义）。这里用比 nearby 略高的优先级(58>55)把「那场/第N场 + 赛事细节词」召回 info.sports，
# 由 sports handler 的 _league_from_history 从上轮回填联赛、_pick_fixture 定位到该场比赛详情。
# guard 排除「电影/演唱会/景点」等同样用「场」的非赛事上下文（歧义时退化通用搜索，不误进周边）。
route_hints:
  - pattern: '(那|这|上一?|哪)\s*一?\s*场[^，。！？]{0,12}(详情|详细|怎么样|怎样|战报|进球|谁进|射手|得分|集锦|经过|赛况|比分|结果|讲讲|说说)|第\s*[一二两三四五六七八九十\d]+\s*场[^，。！？]{0,10}(详情|怎么样|进球|谁进|射手|战报|赛况|比分)'
    guard: '餐厅|饭店|饭馆|美食|火锅|川菜|日料|咖啡|奶茶|甜品|电影|影院|演唱会|音乐会|话剧|舞台剧|展览|展会|酒店|民宿|景点|景区'
    intent: info.sports
    policy: replace
    priority: 58
    slots: {query: "$text"}

  # ── 四模式确定性护栏（2026-07-12 mode-routing 设计 P0-4）：research 有 priority=100
  # 召回而 search/news 为 0 条的不对称补齐——弱 LLM 误判时这两个模式也有网兜。
  # priority=59：避开 trip.modify=60 同级撞车（同级按 agent_id 字典序 info<trip-planner
  # 会反转评估顺序），仍高于 sports 58 / reminder 56 / nearby 55。
  #
  # a) 句首显式搜索动词 → info.search。^锚定防多意图句被 replace 吞掉；「搜索(?!引擎)」防
  #    「搜索引擎是怎么工作的」名词误伤；裸「查」刻意不进动词表（「查理和巧克力工厂」）。
  #    guard=已有专用能力域（天气/指数/股票/新闻/赛事/提醒/导航/附近/车辆状态/说明书/媒体）
  #    + 个人事实（我的/我老婆…→记忆召回，不上网搜）+ 调研词（让位 research=100）。
  - pattern: '^(?:请|麻烦|帮我|帮忙|给我){0,2}(?:上网|联网)?(?:搜索(?!引擎)|搜一下|搜下|搜搜|搜(?!索)|查一下|查下|查查|查一查|查询|检索|百度一下)\s*([^，。！？]{2,})'
    guard: '天气|气温|下雨|降雨|预报|空气质量|洗车|紫外线|指数|限行|股价|股票|大盘|行情|新闻|资讯|头条|要闻|比分|赛程|赛果|对阵|世界杯|欧冠|英超|西甲|中超|NBA|提醒|待办|日程|安排|导航|路线|怎么走|附近|周边|加油站|充电桩|充电站|停车|餐厅|美食|电量|续航|里程|胎压|保养|油耗|说明书|手册|我的|我家|我老婆|我老公|的歌|歌曲|音乐|专辑|播放|深入|调研|研究一下'
    intent: info.search
    policy: replace
    priority: 59
    slots: {query: "$1"}

  # b) 裸新闻/话题新闻 → info.news。slots 留空：topic 由 handler _extract_news_subject 从
  #    raw_text 兜底提取（比捕获组稳）。整句 guard 只留媒体/提醒/搜查（播新闻=端侧
  #    media.play；「搜一下今天的新闻」=刻意保守面，双 hint 互斥留给 LLM 判据）；
  #    打开/关闭/订阅类 app 动作只危及话题式分支（「打开凤凰新闻」），收进该分支句内
  #    前瞻——整句 guard 会误拦「打开空调然后来点新闻」这类多意图句的新闻子句。
  - pattern: '(?:看看|看点|来点|来几条|有什么|有没有|有啥|讲讲|说说|刷刷|读读)[^，。！？]{0,6}(?:新闻|头条|资讯|要闻)|^(?:今天|今日|现在|最近)?(?:有什么|有啥)?(?:新闻|头条|资讯|要闻)$|^(?!.*(?:打开|关闭|订阅|设置))[一-鿿A-Za-z0-9·]{2,10}(?:的)?(?:新闻|资讯|最新消息|最新动态)$'
    guard: '播|放|听|联播|提醒|搜|查'
    intent: info.news
    policy: replace
    priority: 59
    slots: {}

requires_permissions:
  - network.external
  - location.read
edge_intents: []
context_scopes: [location]   # 天气/本地搜索按当前位置反查城市
